name: Build and Push Custom BentoPDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thatdudewithfood/bentopdf-custom:latest
          build-args: |
            SIMPLE_MODE=true
            VITE_DEFAULT_LANGUAGE=sl
            VITE_BRAND_NAME=Ad Acta PDF
            VITE_FOOTER_TEXT=PDF orodja za najboljše računovodje.
            VITE_BRAND_LOGO=public/Ad-Acta-logotip-1.svg
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
